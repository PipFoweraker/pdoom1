schema_version: '1.0'
asset_type: scene_art_wave2
default_size: 1536x1024
background: opaque
output_sizes:
- 1536
- 768
styles:
  scene_base: a full illustrative SCENE with real environmental depth and atmosphere
    (NOT a single symbol on a vignette), painterly StarCraft 2 / XCOM digital matte-painting,
    composed with distinct foreground, midground and background layers, volumetric
    haze, restrained and disciplined lighting, painterly rendered detail, no text,
    no logos, no watermarks, no UI, no readable lettering, no human faces in close-up
  surface_tarkov: Tarkov-style worn metal, scuffed brushed aluminium, chipped paint,
    dust, fingerprints and grime on every surface, lived-in industrial props, exposed
    cable runs and cheap institutional office furniture that has seen years of use
  mood_cozy_dread: tone of cozy competence under existential dread, quiet and intimate,
    the warmth of late-night focus haunted by something larger looming just off-frame;
    Papers-Please deadpan gravity
  register_color: heavily desaturated palette of teal and olive with muted slate greys
    and deep shadow, warm amber CRT/monitor glow as the ONLY saturated accent, low
    overall saturation, at most one ambient light plus one glow source in frame --
    never a rainbow of glows
themes:
  event_hero:
    style_overrides:
    - scene_base
    - surface_tarkov
    - mood_cozy_dread
    - register_color
    color_bias: cinematic key lighting allowed to be dramatic, deep shadow, strong
      atmosphere; still desaturated teal-olive with a single amber (or, only for crisis,
      red-soured) accent
  office_backdrop:
    style_overrides:
    - scene_base
    - surface_tarkov
    - mood_cozy_dread
    - register_color
    color_bias: rendered dim and low-contrast with flat even low-key ambient light,
      muted and softly out of focus, NO bright hotspots, band-0 cosy doom (warm but
      subdued, no alarm, no fire, no smoke); composed as a recessive game background
      that opaque UI panels will sit on top of -- keep the central area and lower
      third calm, dark and uncluttered, push detail to the edges
  records_archive:
    style_overrides:
    - scene_base
    - surface_tarkov
    - mood_cozy_dread
    - register_color
    color_bias: cool desaturated teal-green institutional fluorescent ambient with
      a single warm amber accent, worn brass and steel, bureaucratic and quietly ominous,
      retro-institutional; any screens/plaques show illegible fake glyphs, never real
      readable text
