schema_version: '1.0'
asset_type: round3_rerolls_banners
default_size: 1536x1024
background: opaque
output_sizes:
- 1536
- 768
styles:
  banner_scene_base: wide 1536x1024 landscape hero banner, a full illustrative SCENE
    with real environmental depth and atmosphere (NOT a single symbol on a vignette),
    lush StarCraft 2 / XCOM digital matte-painting, cinematic composition with foreground,
    midground and background layers, volumetric haze and soft god-rays, dramatic but
    restrained key lighting, high dynamic range, painterly rendered detail, room to
    overlay a title in the upper-left negative space, no text, no logos, no watermarks,
    no UI, no human faces in close-up
  surface_tarkov: Tarkov-style worn metal, scuffed brushed aluminium, chipped paint,
    dust, fingerprints and grime on every surface, lived-in industrial props, exposed
    cable runs and cheap office furniture that has seen years of use
  mood_cozy_dread: tone of cozy competence under existential dread, quiet and intimate
    yet quietly ominous, the warmth of late-night focus haunted by something larger
    looming just off-frame
themes:
  base_corporate:
    style_overrides:
    - banner_scene_base
    - surface_tarkov
    - mood_cozy_dread
    color_bias: heavily desaturated palette of teal and olive with muted slate greys,
      warm amber CRT/monitor glow as the only saturated accent, deep shadow, low overall
      saturation
