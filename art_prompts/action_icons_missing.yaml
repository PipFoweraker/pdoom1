schema_version: '1.0'
asset_type: action_icons_missing
default_size: 1024x1024
output_sizes:
- 1024
- 512
- 256
- 128
- 64
background: transparent
styles:
  global_icon_base: high-res 1024x1024 square game icon, single central symbol, soft
    but detailed digital painting with slightly cartoony chunky shapes, StarCraft
    2 / early-2000s XCOM ability-icon feel, plain or softly graded background with
    a subtle vignette, no full scene or environment, no text, no lettering, no numbers,
    strong chunky silhouette that reads clearly at 64x64, limited colour palette,
    high contrast lighting, centered composition
  surface_tarkov: Tarkov-style worn metal and dirty scuffed surfaces but simplified,
    chipped paint and grime, lived-in industrial feel
themes:
  base_corporate:
    style_overrides:
    - global_icon_base
    - surface_tarkov
    color_bias: heavily desaturated teal and olive tones with muted slate grey, a
      single warm amber CRT/monitor glow as the only saturated accent, deep shadow,
      low overall saturation, absolutely no cyan and no electric blue
