schema_version: '1.0'
asset_type: researcher_portraits_pilot
default_size: 1024x1024
output_sizes:
- 1024
- 512
- 256
background: opaque
styles:
  portrait_common: a single fictional invented AI-safety-research staff member, an
    imagined archetype and NOT a portrait of any real person, one figure only, head-and-shoulders
    bust, front-facing, plain contained studio-style background (no room, no scene),
    tightly framed, no watermark, no logo, no caption
  pole_a_painterly: painterly digital matte-painting character portrait in the StarCraft
    2 / XCOM soldier-card manner, visible confident brushwork and canvas texture,
    richly rendered form, dramatic but restrained single-key cinematic lighting with
    soft falloff, high dynamic range, a real sense of a face modelled in paint
  pole_b_crt_dossier: a flat CRT personnel-dossier ID portrait, deadpan Papers-Please
    mugshot aesthetic, limited flat cel shading with hard edges and minimal gradients,
    heavy dot-matrix print texture, dither and faint horizontal scanlines over the
    whole image, a thin rectangular dossier frame with one solid colour role-stripe
    down the side, neutral flat expression, the look of a cheap laminated badge photo
    printed on a terminal, deliberately un-painterly (do NOT render any legible text,
    numbers or letters -- suggest a printed header bar as an abstract band only)
themes:
  pole_a_painterly:
    style_overrides:
    - portrait_common
    - pole_a_painterly
    color_bias: heavily desaturated teal and olive palette with muted slate grey,
      a single warm amber rim/key light as the only saturated accent, dark graded
      background, low overall saturation, no cyan, no electric blue
  pole_b_crt_dossier:
    style_overrides:
    - portrait_common
    - pole_b_crt_dossier
    color_bias: heavily desaturated teal and olive with a warm amber CRT phosphor
      tint over everything, muted slate grey, one solid role-stripe accent, low saturation,
      grainy print, no cyan, no electric blue
