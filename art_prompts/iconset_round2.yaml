schema_version: '1.0'
asset_type: iconset_round2
default_size: 1024x1024
output_sizes:
- 512
- 256
- 128
- 64
- 48
- 32
background: opaque
styles:
  house_base: 'high-res 1024x1024 square app-icon, single central subject, painterly
    digital illustration with a chunky readable silhouette that still holds at 32x32,
    rounded-square icon framing with a soft vignette, cozy-grimdark deadpan mood (lived-in
    office dread, quietly ominous, NEVER gory -- no skulls, no blood, no death-metal),
    disciplined lighting with one warm ambient light plus at most one saturated glow
    accent, centered composition, high contrast

    '
themes:
  house:
    style_overrides:
    - house_base
    color_bias: 'palette -- grounds are deep aubergine #170A1C and ink-brown #14040C
      with warm-panel #2B221A; the ONLY saturated accent is cozy amber #E8A33D / #F6A800
      souring toward orange #E9752E, red-orange #E24A3B and deep red #B31217 as doom
      rises; desaturated teal #1EC3B3 and olive as the cool secondary; off-white #E9F2F2
      for any light. Do not use a rainbow -- keep one accent hue per image.'
