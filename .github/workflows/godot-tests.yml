name: Godot Tests

on:
  push:
    branches: [main]
    paths:
      - 'godot/**/*.gd'
      - 'godot/**/*.tscn'
      - 'godot/project.godot'
      - '.github/workflows/godot-tests.yml'
      - 'scripts/run_godot_tests.py'
  # Run on ALL PRs to main (no path filter) so the required "Unit Tests" /
  # "GDScript Syntax Check" status checks always report and can gate merges.
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: GDScript Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.5.1
          use-dotnet: false

      - name: Verify Godot installation
        run: godot --version

      - name: Import project (populate class cache)
        # A fresh checkout has no global_script_class_cache, so any GUT/headless
        # run would quit(0) before doing anything. Import first. (#629)
        run: godot --headless --path godot --import || true

      - name: Check GDScript syntax
        run: |
          echo "Checking GDScript compilation..."
          godot --headless --path godot --quit 2>&1 | tee godot_output.log

          # Fail on markers that indicate broken GDScript source. Broadened under
          # #629 to include Godot's ACTUAL parse-failure strings ("Parse error",
          # "Failed to load script") -- the old set missed them, so real parse
          # failures passed the syntax gate.
          if grep -E "Cannot load source code|GDScript error|Parse error|Failed to load script|Failed loading resource:.*\.gd" godot_output.log; then
            echo "ERROR GDScript source errors found!"
            exit 1
          else
            echo "SUCCESS GDScript syntax check passed!"
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.5.1
          use-dotnet: false

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Run fast unit gate
        # The runner does the import pass, then GATES on parsed JUnit results:
        # fails on any test failure, on zero/under-floor tests, and on any
        # test_*.gd that GUT silently dropped (parse error / wrong base class).
        # Counts are written to the job summary. (#629 / #590)
        run: |
          python scripts/run_godot_tests.py --quick --ci-mode --min-tests 300

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: godot/test-results-quick.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.5.1
          use-dotnet: false

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Run integration tests
        run: |
          python scripts/run_godot_tests.py --integration-only --ci-mode --min-tests 10

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: godot/test-results-integration.xml

  simulation-tests:
    # SLOW suite: full-game / replay / determinism simulations (~3 min).
    # Kept VISIBLE but non-blocking initially (not wired into Test Summary and
    # not a required status check) -- promote to required once it is stable in
    # CI. continue-on-error lets a failure show as an annotation without failing
    # the overall run. (#629 runtime-split requirement.)
    name: Simulation Tests (slow, non-blocking)
    runs-on: ubuntu-latest
    needs: syntax-check
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.5.1
          use-dotnet: false

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Run simulation suite
        run: |
          python scripts/run_godot_tests.py --simulation --ci-mode --min-tests 80

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: simulation-test-results
          path: godot/test-results-simulation.xml

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [syntax-check, unit-tests, integration-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.syntax-check.result }}" != "success" ]; then
            echo "ERROR Syntax check failed"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "ERROR Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "ERROR Integration tests failed"
            exit 1
          fi
          echo "SUCCESS All required tests passed!"

      - name: Post comment on PR
        if: github.event_name == 'pull_request' && needs.unit-tests.result == 'success'
        continue-on-error: true  # Cosmetic; a transient GitHub API hiccup must not fail the gate
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'SUCCESS Required Godot tests passed!\n\n- GDScript syntax: CHECKED\n- Unit tests (fast gate): CHECKED\n- Integration tests: CHECKED\n\nSee the Simulation Tests job (slow, non-blocking) for full-run coverage.\n\nReady for review!'
            })
